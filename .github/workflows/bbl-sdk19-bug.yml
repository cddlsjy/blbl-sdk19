name: Upload KitKat Debug APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 0.1.1)'
        required: true
        type: string
      changelog:
        description: 'Release notes'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build all debug APKs
        run: ./gradlew assembleDebug -PversionName=${{ inputs.version_name }} -PversionCode=${{ github.run_number }}
      - name: Verify KitKat APK
        run: test -f app/build/outputs/apk/kitkat/debug/app-kitkat-debug.apk
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version_name }}
          NOTES: ${{ inputs.changelog }}
        run: |
          TAG="v${VERSION}"
          APK="app/build/outputs/apk/kitkat/debug/app-kitkat-debug.apk"
          if ! gh release view "$TAG" &>/dev/null; then
            if [ -n "$NOTES" ]; then
              echo "$NOTES" | gh release create "$TAG" --title "$TAG" --notes-file -
            else
              gh release create "$TAG" --title "$TAG" --generate-notes
            fi
          elif [ -n "$NOTES" ]; then
            echo "$NOTES" | gh release edit "$TAG" --notes-file -
          fi
          gh release upload "$TAG" "$APK#blbl-android-${VERSION}-kitkat-debug.apk" --clobber
      - name: Upload to R2 (optional)
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX }}
          VERSION: ${{ inputs.version_name }}
        run: |
          sudo apt-get update && sudo apt-get install -y awscli
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_REGION="auto"
          export AWS_EC2_METADATA_DISABLED=true
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          CLEAN_VERSION="${VERSION#v}"
          PREFIX="${R2_PREFIX:-blbl}"
          PREFIX="${PREFIX%/}/"
          echo "$CLEAN_VERSION" > version
          aws s3 cp version "s3://${R2_BUCKET}/${PREFIX}version" --endpoint-url "$ENDPOINT" --content-type text/plain --cache-control no-cache
          aws s3 cp "app/build/outputs/apk/kitkat/debug/app-kitkat-debug.apk" \
            "s3://${R2_BUCKET}/${PREFIX}blbl-${CLEAN_VERSION}-kitkat-debug.apk" \
            --endpoint-url "$ENDPOINT" --content-type application/vnd.android.package-archive
          aws s3 cp "app/build/outputs/apk/kitkat/debug/app-kitkat-debug.apk" \
            "s3://${R2_BUCKET}/${PREFIX}blbl-latest-kitkat-debug.apk" \
            --endpoint-url "$ENDPOINT" --content-type application/vnd.android.package-archive --cache-control no-cache